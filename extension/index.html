<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabHub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

  <header>
    <div class="header-left">
      <h1 id="greeting"></h1>
      <div class="date" id="dateDisplay"></div>
    </div>
    <div class="header-right">
      <button class="save-session-btn" data-action="save-session">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:14px;height:14px"><path stroke-linecap="round" stroke-linejoin="round" d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0 1 11.186 0Z" /></svg>
        保存会话
      </button>
      <div class="view-toggle" id="viewToggle">
        <button class="view-toggle-btn active" data-view="domain">按域名</button>
        <button class="view-toggle-btn" data-view="window">按窗口</button>
      </div>
    </div>
  </header>

  <div class="quick-links" id="quickLinks"></div>

  <div class="tab-cleanup-banner" id="tabOutDupeBanner" style="display:none">
    <div class="tab-cleanup-left">
      <div class="tab-cleanup-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 0 1-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 0 1 1.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 0 0-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 0 1-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 0 0-3.375-3.375h-1.5a1.125 1.125 0 0 1-1.125-1.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H9.75" />
        </svg>
      </div>
      <div class="tab-cleanup-text">
        你有 <strong id="tabOutDupeCount"></strong> 个 TabHub 页面处于打开状态，只保留当前这个？
      </div>
    </div>
    <button class="tab-cleanup-btn" data-action="close-tabout-dupes">关闭多余的</button>
  </div>

  <div class="dashboard-columns" id="dashboardColumns">

    <div class="active-section" id="openTabsSection" style="display:none">
      <div class="section-header">
        <h2 id="openTabsSectionTitle">打开的标签页</h2>
        <div class="section-line"></div>
        <div class="section-count" id="openTabsSectionCount"></div>
      </div>
      <div class="missions" id="openTabsMissions"></div>
    </div>

    <div class="deferred-column" id="deferredColumn">
      <div class="section-header">
        <h2>稍后阅读</h2>
        <div class="section-line"></div>
        <div class="section-count" id="deferredCount"></div>
      </div>
      <div class="deferred-list" id="deferredList"></div>
      <div class="deferred-empty" id="deferredEmpty">
        暂无保存的内容。
      </div>
    </div>

    <div class="frequent-column" id="frequentColumn">
      <div class="section-header">
        <h2>近期常用</h2>
        <div class="section-line"></div>
        <div class="section-count" id="frequentCount"></div>
      </div>
      <div class="frequent-list" id="frequentList"></div>
      <div class="frequent-empty" id="frequentEmpty">
        暂无近期常用的页面。
      </div>
    </div>

  </div>

  <div class="sessions-section" id="sessionsSection" style="display:none">
    <div class="section-header">
      <h2>已保存的会话</h2>
      <div class="section-line"></div>
      <div class="section-count" id="sessionsCount"></div>
    </div>
    <div class="sessions-grid" id="sessionsList"></div>
    <div class="sessions-empty" id="sessionsEmpty" style="display:none">
      暂无保存的会话。
    </div>
  </div>

  <footer>
    <div class="footer-stats">
      <div class="stat">
        <div class="stat-num" id="statTabs">—</div>
        <div class="stat-label">打开的标签</div>
      </div>
    </div>
    <div class="last-refresh">
      <span>TabHub</span>
    </div>
  </footer>

</div>

<div class="toast" id="toast">
  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
  </svg>
  <span id="toastText"></span>
</div>

<script src="app.js"></script>
</body>
</html>
